<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&amp;family=Space+Grotesk:wght@400;500&amp;display=swap');
      .title { font-family: 'Poppins', sans-serif; font-weight: 800; }
      .subtitle { font-family: 'Space Grotesk', sans-serif; font-weight: 500; }
      .pill-text { font-family: 'Space Grotesk', sans-serif; font-weight: 500; }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0B1220"/>
      <stop offset="75%" stop-color="#0F1B3D"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="glassStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="blurHeavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <clipPath id="clipAll">
      <rect width="1200" height="320" rx="0"/>
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <g clip-path="url(#clipAll)">
    <circle cx="140" cy="60" r="160" fill="#1D4ED8" opacity="0.55" filter="url(#blurHeavy)"/>
    <circle cx="1080" cy="70" r="180" fill="#7C3AED" opacity="0.35" filter="url(#blurHeavy)"/>
    <circle cx="600" cy="300" r="220" fill="#0EA5E9" opacity="0.30" filter="url(#blurHeavy)"/>
    <circle cx="950" cy="280" r="120" fill="#22D3EE" opacity="0.20" filter="url(#blurHeavy)"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="90" y="55" width="1020" height="210" rx="36" fill="url(#glassFill)" stroke="url(#glassStroke)" stroke-width="1.4"/>
    <path d="M 108 91 Q 600 55 1092 91 L 1092 120 Q 600 100 108 120 Z" fill="url(#sheen)" opacity="0.6"/>
  </g>

  <text x="600" y="150" text-anchor="middle" class="title" font-size="60" fill="url(#titleGrad)" letter-spacing="2">NEEL KORE</text>
  <text x="600" y="188" text-anchor="middle" class="subtitle" font-size="19" fill="#CBD5E1" letter-spacing="0.5">Software Engineering Student  &#8226;  MERN Stack Developer  &#8226;  Cybersecurity Enthusiast</text>

  <g class="pill-text" font-size="13" fill="#E2E8F0">
    <rect x="430" y="205" width="90" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#60A5FA" stroke-opacity="0.5"/>
    <text x="475" y="224" text-anchor="middle">MERN</text>

    <rect x="530" y="205" width="130" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="595" y="224" text-anchor="middle">Cybersecurity</text>

    <rect x="670" y="205" width="100" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.5"/>
    <text x="720" y="224" text-anchor="middle">DSA</text>
  </g>
</svg>
